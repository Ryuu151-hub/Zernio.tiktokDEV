<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zernio TikTok Uploader</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      color: #111;
    }
    h1 { font-size: 15px; margin: 0 0 12px; }
    .row { margin-bottom: 10px; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    input[type="text"], select, textarea {
      width: 100%; box-sizing: border-box; padding: 6px 8px;
      border: 1px solid #ccc; border-radius: 6px; font-size: 13px;
    }
    textarea { resize: vertical; min-height: 50px; }
    button {
      width: 100%; padding: 8px; border: none; border-radius: 6px;
      background: #111; color: #fff; font-size: 13px; cursor: pointer;
    }
    button:disabled { background: #999; cursor: default; }
    button.secondary { background: #eee; color: #111; }
    #status { font-size: 12px; margin-top: 10px; white-space: pre-wrap; }
    #account { font-size: 12px; margin-bottom: 10px; }
    .checks { display: flex; gap: 12px; font-size: 12px; margin-bottom: 10px; }
    .checks label { display: flex; align-items: center; gap: 4px; margin: 0; }
  </style>
</head>
<body>
  <h1>Zernio TikTok Uploader</h1>

  <div id="loggedOutView">
    <button id="loginBtn">Log in with TikTok</button>
  </div>

  <div id="loggedInView" style="display:none">
    <div id="account"></div>

    <div class="row">
      <label for="profileSelect">Zernio profile</label>
      <select id="profileSelect"></select>
    </div>

    <div class="row">
      <label for="fileInput">Video</label>
      <input type="file" id="fileInput" accept="video/mp4,video/webm" />
    </div>

    <div class="row">
      <label for="captionInput">Caption</label>
      <textarea id="captionInput" placeholder="Say something about this video..."></textarea>
    </div>

    <div class="row">
      <label for="privacySelect">Who can view this post</label>
      <select id="privacySelect"></select>
    </div>

    <div class="checks">
      <label><input type="checkbox" id="disableComment" /> No comments</label>
      <label><input type="checkbox" id="disableDuet" /> No duet</label>
      <label><input type="checkbox" id="disableStitch" /> No stitch</label>
    </div>

    <div class="row">
      <button id="postBtn">Post to TikTok</button>
    </div>
    <div class="row">
      <button id="logoutBtn" class="secondary">Log out</button>
    </div>
  </div>

  <div id="status"></div>

  <script src="config.js"></script>
  <script src="tiktok-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
